<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Attendee Navigation - EventFlow V2">
  <meta name="theme-color" content="#060A10">
  <title>Smart Navigation — EventFlow</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep: #060A10; --bg-card: #0D1421; --border: rgba(255,255,255,0.07);
      --green: #00C49A; --red: #FF4757; --yellow: #FFD166;
      --text-primary: #F0F4F8; --text-secondary: #8899A6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text-primary); }
    
    #map { width: 100%; height: 60vh; background: #1a2233; }
    
    .panel {
      padding: 20px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      height: 40vh;
      overflow-y: auto;
    }
    .panel h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; margin-bottom: 12px; display: flex; justify-content: space-between; }
    .route-steps { font-size: 1rem; color: var(--text-primary); margin-bottom: 20px; font-weight: 500; }
    
    .suggestion {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    .status-warning { border-color: rgba(255, 209, 102, 0.4); background: rgba(255, 209, 102, 0.1); color: var(--yellow); }
    .status-critical { border-color: rgba(255, 71, 87, 0.4); background: rgba(255, 71, 87, 0.1); color: var(--red); }
    .status-clear { border-color: rgba(0, 196, 154, 0.4); background: rgba(0, 196, 154, 0.1); color: var(--green); }
    
    .back-btn {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; width: 40px; height: 40px;
      color: var(--text-primary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
  </style>

  <script>
    window.efMap = null;
    window.efRoutePolyline = null;
    window.initMap = () => {
      window.efMap = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 23.0915, lng: 72.5976 },
        zoom: 18,
        mapId: 'e4b9db3073df26e8',
        disableDefaultUI: true,
        backgroundColor: '#060A10'
      });
      // Polyline for route rendering — google.maps.Polyline is still current API
      window.efRoutePolyline = new google.maps.Polyline({
        path: [],
        geodesic: true,
        strokeColor: '#FFD700',
        strokeOpacity: 0.9,
        strokeWeight: 6,
        map: window.efMap
      });
      console.log("Map initialized");
      window.dispatchEvent(new CustomEvent('mapsReady'));
    };
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAB-rkKZiGCOsnWR0gXhMyCOvau0iMYovs&callback=initMap&libraries=maps,marker&v=weekly&loading=async" defer></script>
</head>
<body>

  <button class="back-btn" onclick="window.history.back()" aria-label="Go back">←</button>
  <div id="map" aria-label="Attendee navigation dashboard"></div>
  
  <div class="panel">
    <!-- UI Controllers -->
    <div style="display:flex; gap:10px; margin-bottom:12px;">
      <select id="startZone" style="flex:1; padding:8px; background:var(--bg-deep); border:1px solid var(--border); color:var(--text-primary); border-radius:6px; font-family:'DM Sans', sans-serif;">
      </select>
      <span style="display:flex; align-items:center; color:var(--text-secondary);">→</span>
      <select id="destinationZone" style="flex:1; padding:8px; background:var(--bg-deep); border:1px solid var(--border); color:var(--text-primary); border-radius:6px; font-family:'DM Sans', sans-serif;">
      </select>
    </div>
    <button id="calculateRouteBtn" style="width:100%; padding:10px; margin-bottom:16px; background:#4A90E2; color:#FFF; font-weight:bold; border:none; border-radius:8px; cursor:pointer; font-family:'DM Sans', sans-serif;">Calculate Route</button>

    <h2>🧭 Your Route <span id="nav-eta" style="color:var(--green); font-size: 1rem;">-- min</span></h2>
    <div class="route-steps" id="nav-path" style="margin-bottom:12px;">Calculating best route...</div>
    
    <div id="instructions-panel" style="margin-bottom:16px; font-size:0.9rem; color:var(--text-secondary); line-height:1.6; display:flex; flex-direction:column; gap:4px;"></div>

    <div id="nav-suggestion" class="suggestion">
      <div style="font-family:'Space Grotesk',sans-serif; text-transform:uppercase; font-size:0.75rem; letter-spacing:0.05em; margin-bottom:4px;">Smart Suggestion</div>
      <div id="smartSuggestion">Analyzing conditions...</div>
    </div>
  </div>

  <script type="module">
    import { listenZones, listenEmergency } from '/src/firebase.js';
    import { findBestRoute, findAlternatePath } from '/src/pathfindingEngine.js';
    import { ZONES } from '/src/simulation.js';
    import { zoneCoordinates, getZonePosition } from '/src/zoneCoordinates.js';
    import { zoneGraph } from '/src/zoneGraph.js';
    import { loginAnonymously } from '/src/auth.js';
    import { updateDensityMap, zoneDensityMap } from '/src/pathfindingEngine.js';

    function drawZoneMarkers(map) {
      if (!zoneCoordinates) return;
      Object.keys(zoneCoordinates).forEach(zoneId => {
        let coord = zoneCoordinates[zoneId];
        if (!coord) coord = { lat: 23.0918, lng: 72.5972 }; // Fallback safety
        console.log("Marker:", zoneId);
        new google.maps.marker.AdvancedMarkerElement({
          position: coord,
          map: map,
          title: zoneId.toUpperCase()
        });
      });
      console.log("Markers drawn");
    }

    let routeLines = [];

    function drawZoneRoutes(map) {
      Object.keys(zoneGraph).forEach(zoneId => {
        const connections = zoneGraph[zoneId];
        connections.forEach(connection => {
          let start = zoneCoordinates[zoneId];
          let end = zoneCoordinates[connection.node];

          if (!start || !end) return;

          const polyline = new google.maps.Polyline({
            path: [start, end],
            geodesic: true,
            strokeColor: "#00C49A",
            strokeOpacity: 0.8,
            strokeWeight: 3,
            map: map
          });
          routeLines.push(polyline);
        });
      });
      console.log("Routes drawn");
    }

    // Map initialization listener
    window.addEventListener('mapsReady', () => {
      if (!window.efMap) return;
      drawZoneMarkers(window.efMap);
      drawZoneRoutes(window.efMap);
    });

    // Fallback Calculation Loop
    setTimeout(() => {
      if (window.efMap && routeLines.length === 0) {
        drawZoneMarkers(window.efMap);
        drawZoneRoutes(window.efMap);
      }
    }, 1000);

    function clearRoutes() {
      routeLines.forEach(line => {
        line.setMap(null);
      });
      routeLines = [];
    }

    function refreshRoutes() {
      clearRoutes();
      drawZoneRoutes(window.efMap);
    }

    let goldLines = [];
    let blueLines = [];

    function clearGoldRoutes() {
      goldLines.forEach(line => line.setMap(null));
      goldLines = [];
    }
    
    function clearBlueRoutes() {
      blueLines.forEach(line => line.setMap(null));
      blueLines = [];
    }

    function drawAlternateRoute(path) {
      if (!path || path.length < 2) return;
      clearBlueRoutes();
      for (let i = 0; i < path.length - 1; i++) {
        const start = zoneCoordinates[path[i]];
        const end = zoneCoordinates[path[i + 1]];
        if (!start || !end) continue;
        const blueLine = new google.maps.Polyline({
          path: [start, end],
          strokeColor: "#4285F4",
          strokeOpacity: 0.7,
          strokeWeight: 4,
          geodesic: true,
          zIndex: 5,
          map: window.efMap
        });
        blueLines.push(blueLine);
      }
    }

    function drawBestRoute(path) {
      if (!path || path.length < 2) return;
      clearGoldRoutes();

      for (let i = 0; i < path.length - 1; i++) {
        const start = zoneCoordinates[path[i]];
        const endNode = path[i + 1];
        const end = zoneCoordinates[endNode];

        if (!start || !end) continue;

        const density = zoneDensityMap[endNode] || 0;
        let color = "#00C49A"; // Low
        if (density >= 50 && density <= 80) color = "#FFD700"; // Medium
        if (density > 80) color = "#FF4D4D"; // High

        const goldLine = new google.maps.Polyline({
          path: [start, end],
          strokeColor: color,
          strokeOpacity: 1,
          strokeWeight: 6,
          geodesic: true,
          zIndex: 10,
          map: window.efMap
        });
        
        goldLines.push(goldLine);
      }
    }

    function calculateRouteTime(path) {
      if (!path || path.length < 2) {
        return 0;
      }
      const steps = path.length - 1;
      const timePerStep = 2; // Fixed time step scaling
      return steps * timePerStep;
    }

    // Instruction System
    function generateInstructions(path) {
      const container = document.getElementById("instructions-panel");
      if (!path || path.length < 2) {
         container.innerHTML = "<div>No valid route instructions available.</div>";
         return;
      }
      let html = "";
      path.forEach((zone, index) => {
         const zoneName = ZONES[zone]?.name || zone;
         if (index === 0) html += `<div><b>${index + 1}.</b> Start at ${zoneName}</div>`;
         else if (index === path.length - 1) html += `<div><b>${index + 1}.</b> Exit to ${zoneName}</div>`;
         else html += `<div><b>${index + 1}.</b> Continue to ${zoneName}</div>`;
      });
      container.innerHTML = html;
    }

    // Moving Simulation Node
    let simMarker = null;
    let simInterval = null;

    function startMarkerSimulation(path) {
      if (simMarker) simMarker.map = null;
      if (simInterval) clearInterval(simInterval);
      if (!window.efMap || !path || path.length === 0) return;

      let currentIndex = 0;
      
      const dot = document.createElement("div");
      dot.style.width = "16px";
      dot.style.height = "16px";
      dot.style.backgroundColor = "#FFFFFF";
      dot.style.border = "3px solid #2D2D2D";
      dot.style.borderRadius = "50%";
      dot.style.boxShadow = "0 0 6px rgba(0,0,0,0.5)";

      simMarker = new google.maps.marker.AdvancedMarkerElement({
        position: zoneCoordinates[path[0]],
        map: window.efMap,
        content: dot,
        zIndex: 100
      });

      simInterval = setInterval(() => {
        currentIndex++;
        if (currentIndex >= path.length) {
          clearInterval(simInterval);
          return;
        }
        const coords = zoneCoordinates[path[currentIndex]];
        if (coords && simMarker) simMarker.position = coords;
      }, 1000); // 1 zone per second
    }

    let currentDensities = {};
    let isEmergency = false;
    let emergencyZone = null;
    
    function populateDropdowns() {
      const startSelect = document.getElementById("startZone");
      const destSelect = document.getElementById("destinationZone");
      Object.keys(zoneCoordinates).forEach(zone => {
         const name = ZONES[zone]?.name || zone;
         startSelect.add(new Option(name, zone));
         destSelect.add(new Option(name, zone));
      });
      startSelect.value = "parking";
      destSelect.value = "north";
      
      document.getElementById("calculateRouteBtn").addEventListener("click", updateNavigation);
    }

    window.findShortestPath = function(start, dest, graphOverride) {
      const enrichedZones = Object.entries(currentDensities).map(([id, d]) => {
        const zDef = ZONES[id] || {};
        return {
          id, capacity: zDef.cap || 10000, currentFans: Math.round(d * (zDef.cap || 10000)), blocked: (isEmergency && emergencyZone === id)
        };
      });
      const res = findBestRoute(start, dest, enrichedZones);
      return res ? res.path : [];
    };

    window.calculateBestRoute = function() {
      const start = document.getElementById("startZone").value;
      const destination = document.getElementById("destinationZone").value;
      console.log("Start Zone:", start);
      console.log("Destination Zone:", destination);
      
      if (!start || !destination) {
        console.error("Missing zone values");
        return;
      }
      
      const bestPath = window.findShortestPath(start, destination);
      if (!bestPath || bestPath.length === 0) {
        console.error("No path returned from Dijkstra");
        return;
      }
      console.log("Best Path:", bestPath);
      
      updateNavigation();
    };

    // Keep internal legacy logic robust
    function updateNavigation() {
      const startZone = document.getElementById("startZone").value;
      const destinationZone = document.getElementById("destinationZone").value;

      const enrichedZones = Object.entries(currentDensities).map(([id, d]) => {
        const zDef = ZONES[id] || {};
        return {
          id, capacity: zDef.cap || 10000, currentFans: Math.round(d * (zDef.cap || 10000)), blocked: (isEmergency && emergencyZone === id)
        };
      });

      // 1. Calculate Routes — use all known zones as fallback if densities empty
      const zonesForRouting = enrichedZones.length > 0 ? enrichedZones
        : Object.keys(zoneCoordinates).map(id => ({
            id, capacity: 10000, currentFans: 0, blocked: false
          }));

      let pathResult = findBestRoute(startZone, destinationZone, zonesForRouting);
      if (!pathResult || !pathResult.path || pathResult.path.length === 0) {
        console.error("updateNavigation: no path found for", startZone, "->", destinationZone);
        return;
      }
      const path = pathResult.path;
      
      let altResult = findAlternatePath(startZone, destinationZone, path, zonesForRouting);

      // 2. Map Update (Primary + Alternate)
      if (window.efMap) {
        drawBestRoute(path);
        console.log("Best Route Drawn");
        if (altResult && altResult.path) drawAlternateRoute(altResult.path);
        else clearBlueRoutes();
        console.log("Alternate Route Drawn");
        startMarkerSimulation(path);
      } else {
        // Map not ready yet — will re-run once mapsReady fires
        console.warn("Map not ready, queuing route draw");
      }

      // 3. Update DOM Panel
      const pathText = path.map(p => ZONES[p]?.name?.replace(' Stand','') || p).join(' → ');
      document.getElementById('nav-path').textContent = pathText;
      
      const time = calculateRouteTime(path);
      document.getElementById('nav-eta').innerText = "~" + time + " min";
      
      generateInstructions(path);
      updateSmartMessage(path);
      console.log("Smart Suggestion Updated");
    }

    function analyzeRoute(path) {
      let crowdedZones = [];
      let mediumZones = [];

      path.forEach(zone => {
        const density = zoneDensityMap[zone] || 0;
        if (density > 80) {
          crowdedZones.push({ zone, density });
        } else if (density >= 50) {
          mediumZones.push({ zone, density });
        }
      });

      return { crowdedZones, mediumZones };
    }

    function estimateTimeSaving(path) {
      let delay = 0;
      path.forEach(zone => {
        const density = zoneDensityMap[zone] || 0;
        if (density > 80) delay += 2;
      });
      return delay;
    }

    function generateSmartSuggestion(path) {
      const result = analyzeRoute(path);

      if (result.crowdedZones.length > 0) {
        const zone = result.crowdedZones[0];
        return "🔴 High congestion at " + zone.zone + " (" + Math.round(zone.density) + "%). Rerouting applied.";
      }

      if (result.mediumZones.length > 0) {
        const zone = result.mediumZones[0];
        return "🟡 Moderate crowd near " + zone.zone + ". Expect minor delays.";
      }

      return "🟢 Optimal path selected — conditions clear.";
    }

    function updateSmartMessage(path) {
      const message = generateSmartSuggestion(path);
      const savedTime = estimateTimeSaving(path);
      
      let finalMessage = message;
      if (savedTime > 0) {
         finalMessage += " Estimated delay avoided: " + savedTime + " min.";
      }
      
      const suggEl = document.getElementById("nav-suggestion");
      document.getElementById("smartSuggestion").innerText = finalMessage;
      
      // Update visual container
      suggEl.className = 'suggestion'; // Reset
      if (finalMessage.includes('🔴')) suggEl.classList.add('status-critical');
      else if (finalMessage.includes('🟡')) suggEl.classList.add('status-warning');
      else suggEl.classList.add('status-clear');
    }


    async function startNavigation() {
      populateDropdowns();
      
      console.log("Authenticating anonymous session...");
      try {
        await loginAnonymously();
      } catch (e) {
        console.warn("Auth check failed:", e);
      }

      // Subscribe to Data
      console.log("Subscribing to Firebase...");
      listenZones(dens => {
        const data = dens;
        if (!data) return;
        
        Object.keys(data).forEach(zoneId => {
          let rawD = data[zoneId].density !== undefined ? data[zoneId].density : data[zoneId];
          zoneDensityMap[zoneId] = rawD <= 1.0 ? rawD * 100 : rawD; // Normalization safety
        });
        
        console.log("Density Updated:", zoneDensityMap);
        
        try {
          window.calculateBestRoute(); // Re-route on density change
        } catch(e) {
          console.error("calculateBestRoute failed:", e);
        }
        // Only refresh zone overlays if map is already ready
        if (window.efMap) refreshRoutes();
      });

      listenEmergency(state => {
        isEmergency = state.active;
        emergencyZone = state.zone;
        window.calculateBestRoute();
      });
    }

    // Auto-route on page load — fires after map is ready
    window.addEventListener('mapsReady', () => {
      console.log("Map ready — drawing initial best route");
      if (document.getElementById("startZone")?.value) {
        window.calculateBestRoute();
      }
    });

    startNavigation();

  </script>
</body>
</html>
